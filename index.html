<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>to do list</title>
  </head>
  <body>
    <!-- start to do list  -->

    <div class="container">
      <!-- start header  -->

      <div class="text">
        <h2>from your man</h2>
        <h2>to his sweet heart</h2>
      </div>

      <!-- end header  -->

      <!-- start inputs -->

      <div class="input-container">
        <input
          type="text"
          name="tasks"
          class="tasks-input"
          placeholder="Enter Your Task Ya Monmon"
          autocomplete="off"
        />
        <button class="add">add</button>
      </div>

      <!-- end inputs -->

      <!-- start task container  -->

      <div class="tasks-container">There Is No Tasks Yet</div>

      <!-- end task container  -->

      <!-- start points container  -->

      <div class="points">points this week = <span>0</span></div>

      <!-- end points container  -->

      <!-- start weekly score container  -->

      <div class="your-score">
        <div class="score">Its your First Week Honey</div>
      </div>

      <!-- end weekly score container  -->
    </div>

    <!-- end to do list  -->

    <script src="main.js"></script>
  </body>
</html>
